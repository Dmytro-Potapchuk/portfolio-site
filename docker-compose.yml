name: portfolio-site

services:
  portfolio-site:
    image: ${DOCKERHUB_USERNAME:-keyn1990}/portfolio-site:latest
    container_name: portfolio-site
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8009}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
