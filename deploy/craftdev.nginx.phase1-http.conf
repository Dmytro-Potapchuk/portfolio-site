# ETAP 1 — tylko HTTP (port 80), proxy do Dockera na 8009.
# Użyj tego NAJPIERW, gdy nie masz jeszcze certyfikatów Let's Encrypt.
# Gdy http://craftdev.pl działa, uruchom certbot (patrz CRAFTDEV-DOMAIN.md),
# potem ZAMIEŃ ten plik na craftdev.nginx.conf (HTTPS + przekierowanie).

server {
    listen 80;
    listen [::]:80;
    server_name craftdev.pl www.craftdev.pl;

    location / {
        proxy_pass http://127.0.0.1:8009;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
