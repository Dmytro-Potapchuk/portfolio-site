# ETAP 2 — HTTPS: wymaga certyfikatów Let's Encrypt na serwerze:
#   /etc/letsencrypt/live/craftdev.pl/fullchain.pem
#   /etc/letsencrypt/live/craftdev.pl/privkey.pem
#
# Najczęściej: najpierw wdroż craftdev.nginx.phase1-http.conf, potem:
#   sudo certbot --nginx -d craftdev.pl -d www.craftdev.pl
# Certbot może sam dopisać SSL — wtedy opcjonalnie scal ustawienia z tym plikiem
# (przekierowanie HTTP→HTTPS + HSTS poniżej).
#
# Instalacja ręczna tego pliku: po certbot, skopiuj do sites-available i:
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP — tylko przekierowanie na HTTPS (nie serwuj aplikacji po HTTP)
server {
    listen 80;
    listen [::]:80;
    server_name craftdev.pl www.craftdev.pl;
    return 301 https://$host$request_uri;
}

# HTTPS — reverse proxy do kontenera Docker (port 8009)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name craftdev.pl www.craftdev.pl;

    ssl_certificate     /etc/letsencrypt/live/craftdev.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/craftdev.pl/privkey.pem;

    # Pakiet certbot-nginx na Ubuntu/Debian — jeśli `nginx -t` krzyczy, zakomentuj linię include:
    include /etc/letsencrypt/options-ssl-nginx.conf;

    # Przeglądarki będą preferować HTTPS (rok+)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8009;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
