name: Build and Deploy to VPS

on:
  push:
    branches:
      - main
      - master
      - Dmytro-Potapchuk-patch-1
  workflow_dispatch:

env:
  IMAGE_NAME: portfolio-site

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-on-vps:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH and Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -e
            mkdir -p ~/apps/portfolio-site
            cd ~/apps/portfolio-site
            cat > .env <<EOF
            COMPOSE_PROJECT_NAME=portfolio-site
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            APP_PORT=8009
            EOF
            cat > docker-compose.yml <<'EOF'
            name: portfolio-site
            services:
              portfolio-site:
                image: ${DOCKERHUB_USERNAME}/portfolio-site:latest
                container_name: portfolio-site
                restart: unless-stopped
                ports:
                  - "${APP_PORT}:80"
            EOF
            # Stary kontener z poprzedniego deployu (np. docker run) blokuje tę samą nazwę — usuń przed compose up
            docker compose down 2>/dev/null || true
            docker rm -f portfolio-site 2>/dev/null || true
            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
