name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-site:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-site:latest

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p ~/portfolio-site
            cd ~/portfolio-site

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-site:latest

            docker stop portfolio-site || true
            docker rm portfolio-site || true

            docker run -d \
              --name portfolio-site \
              -p 8009:80 \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-site:latest
